aid: jsf
name: JSF
description: >-
  Jakarta Faces (formerly JavaServer Faces / JSF) is an MVC framework for
  building component-based user interfaces for Java web applications. It
  simplifies the development of web UIs through a component-driven approach
  with managed beans, an event-driven programming model, page navigation,
  state management, input validation, and built-in support for
  internationalization and accessibility. Jakarta Faces 4.1 is the current
  stable release with Jakarta EE 11, with 5.0 in development for Jakarta EE 12.
